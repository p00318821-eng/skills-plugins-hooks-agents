# Naming Conventions for Semantic Model Objects
# Scope: Houston ISD Power BI semantic models
# Rule: DO NOT RENAME columns or tables without explicit user approval. Flag issues and recommend business-readable names.

table:
  style: business-readable
  rules:
    - Use plural nouns for fact tables (Students, Assessments, Incidents)
    - Use singular or plural for dimensions based on natural usage (Campus vs Campuses)
    - No prefixes like "dim_" or "fact_" in display names
    - PascalCase with spaces allowed (Student Assessments)

column:
  style: business-readable
  rules:
    - Use business terms, not source system names
    - PascalCase with spaces (Student Name, not student_name)
    - Boolean columns: prefix with "Is" or "Has" (IsActive, HasIEP)
    - Date columns: suffix with "Date" (EnrollmentDate, BirthDate)
    - ID/Key columns: suffix with "ID" or "Key" (StudentID, CampusKey)
    - Avoid abbreviations unless universally understood (ID, SSN)

measure:
  style: business-readable
  rules:
    - Use clear metric names (Student Count, not cnt_students)
    - Include unit hints for ambiguous metrics (Attendance Rate %, Days Absent)
    - Calculation type prefixes when helpful (Avg, Total, YTD, Prior Year)
    - Organize in displayFolder by business domain

relationship:
  pattern: "{FromTable}_to_{ToTable}_via_{KeyDescription}"
  note: "TMDL does not support /// descriptions on relationships. Use naming convention and structural properties only."
  rules:
    - Always name relationships explicitly
    - Use underscores between segments, business terms for key description
    - Ensure uniqueness across model
    - Reflect the business meaning, not just technical join
  examples:
    good:
      - "Students_to_Campuses_via_HomeCampus"
      - "Assessments_to_Students_via_AssessedStudent"
      - "Incidents_to_Staff_via_ReportingTeacher"
    bad:
      - "Relationship 1"
      - "fk_student_campus"
      - "Students_Campuses"
      - "0d78ca4c-dd11-1fe8-dc81-cadc94f61639"

synonyms:
  dual_annotations_required:
    pipe_format: 'annotation Synonyms = term1|term2|term3'
    array_format: 'annotation SynonymCollection = ["term1","term2","term3"]'
  note: "Both annotations must contain identical terms. Synonyms feeds Copilot Q&A in Report. SynonymCollection feeds FDA and Copilot in Service."
  quantity:
    min: 3
    max: 7
    target: 5
  priority_order:
    - Business terms users speak naturally
    - Common acronyms and abbreviations (ISS, OSS, SPED, TEA)
    - Related concepts for query expansion
    - Legacy field names still in use
  exclude_terms:
    - data
    - item
    - info
    - value
    - field
    - column
    - record
    - entry
  exclude_patterns:
    - Single characters
    - Pure technical identifiers
    - Underscore-prefixed terms

description:
  syntax: "/// directly above object declaration (no blank line between)"
  max_length: 200
  structure: "[What it is] + [Business context or usage hint]"
  supported_objects:
    - Tables
    - Columns (visible and hidden)
    - Measures
    - Hierarchies and hierarchy levels
  not_supported:
    - Relationships
    - Partitions
    - Annotations
  avoid_phrases:
    - "This column contains"
    - "Data for"
    - "Field representing"
    - "Stores the"